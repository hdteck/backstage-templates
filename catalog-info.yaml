apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: springboot-from-repo
  title: Crear Spring Boot desde repo base con CI
  description: Clona un repo base, crea nuevo repo y añade pipeline CI/CD
  annotations:
    github.com/project-slug: hdteck/backstage-templates
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Configuración
      required:
        - appName
        - repoName
        - baseRepo
      properties:
        appName:
          type: string
          title: Nombre de la aplicación

        repoName:
          type: string
          title: Nombre del nuevo repositorio

        baseRepo:
          type: string
          title: Repositorio base
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    # 1️⃣ Clonar repo base
    - id: fetch-base
      name: Clonar repo base
      action: fetch:template
      input:
        url: ${{ parameters.baseRepo }}
        values:
          name: ${{ parameters.appName }}

    # 2️⃣ Añadir CI/CD
    - id: add-ci
      name: Añadir pipeline CI
      action: fetch:template
      input:
        url: ./ci-template
        targetPath: .github/workflows

    # 3️⃣ Crear repo nuevo y subir todos los archivos
    - id: publish
      name: Crear repo en GitHub y subir código
      action: github:push
      input:
        repoUrl: github.com?owner=hdteck&repo=${{ parameters.repoName }}
        files:
          - path: .
            content: ${{ steps.fetch-base.output.files }}

    # 4️⃣ Registrar en catálogo Backstage
    - id: register
      name: Registrar en catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
