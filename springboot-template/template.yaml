apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: springboot-from-repo-pro
  title: Spring Boot desde repo existente (PRO)
  description: Clona un repo Spring Boot y lo registra en Backstage con CI y Docker
  tags:
    - java
    - springboot
    - backend

spec:
  owner: user:guest
  type: service

  parameters:
    - title: Configuración
      required:
        - name
        - sourceRepoUrl
        - repoUrl
      properties:
        name:
          type: string
          title: Nombre del servicio

        sourceRepoUrl:
          type: string
          title: Repo origen (Spring Boot)

        repoUrl:
          type: string
          title: Repo destino
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    # 1. Clonar código fuente
    - id: fetch-source
      action: fetch:plain
      input:
        url: ${{ parameters.sourceRepoUrl }}

    # 2. Añadir estructura Backstage (renderiza variables)
    - id: apply-template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}

    # 3. Crear repo nuevo
    - id: publish
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    # 4. Registrar en catálogo
    - id: register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositorio
        url: ${{ steps.publish.output.remoteUrl }}